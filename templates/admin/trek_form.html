{% extends 'base.html' %}
{% block content %}
{% include 'admin/_nav.html' %}
<h3>{{ 'Edit Trek' if trek else 'Add New Trek' }}</h3>
<form method="POST">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Trek Name</label>
      <input type="text" name="name" class="form-control" value="{{ trek.name if trek else '' }}" required>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Location</label>
      <input type="text" name="location" class="form-control" value="{{ trek.location if trek else '' }}" required>
    </div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Difficulty</label>
      <select name="difficulty" class="form-select" required>
        <option value="" disabled {{ 'selected' if not trek else '' }}>-- Select --</option>
        {% for level in difficulties %}
        <option value="{{ level }}" {{ 'selected' if trek and trek.difficulty == level else '' }}>{{ level }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Duration (Days)</label>
      <input type="number" name="duration_days" min="1" class="form-control" value="{{ trek.duration_days if trek else '' }}" required>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Available Slots</label>
      <input type="number" name="available_slots" min="0" class="form-control" value="{{ trek.available_slots if trek else '' }}" required>
    </div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Assign Staff</label>
      <select name="assigned_staff_id" class="form-select">
        <option value="">-- Unassigned --</option>
        {% for profile in staff_options %}
        <option value="{{ profile.id }}" {{ 'selected' if trek and trek.assigned_staff_id == profile.id else '' }}>{{ profile.user.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Status</label>
      <select name="status" class="form-select" required>
        {% for st in statuses %}
        <option value="{{ st }}" {{ 'selected' if (trek and trek.status == st) or (not trek and st == 'Pending') else '' }}>{{ st }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">Start Date</label>
      <input type="date" name="start_date" class="form-control" value="{{ trek.start_date if trek else '' }}">
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">End Date</label>
      <input type="date" name="end_date" class="form-control" value="{{ trek.end_date if trek else '' }}">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="3">{{ trek.description if trek else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('admin.treks') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
